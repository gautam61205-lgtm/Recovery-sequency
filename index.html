<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Access</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#050505;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 30%, rgba(0,255,100,.08), transparent 30%),
    radial-gradient(circle at 80% 70%, rgba(0,255,100,.08), transparent 30%);
    animation:float 10s infinite alternate;
}

@keyframes float{
    from{transform:translateY(-20px);}
    to{transform:translateY(20px);}
}

.card{
    width:min(90%,650px);
    background:rgba(255,255,255,.03);
    border:1px solid rgba(0,255,100,.15);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:28px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,255,100,.08);
    z-index:2;
}

.small{
    color:#8d8d8d;
    font-size:.9rem;
    margin-bottom:15px;
    letter-spacing:2px;
}

h1{
    font-size:2rem;
    margin-bottom:15px;
    font-weight:700;
}

p{
    color:#b9b9b9;
    line-height:1.7;
    margin-bottom:25px;
}

button{
    border:none;
    background:#00ff73;
    color:black;
    padding:14px 28px;
    border-radius:999px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(0,255,100,.4);
}

input{
    width:100%;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    color:white;
    padding:14px;
    border-radius:14px;
    margin:18px 0;
    text-align:center;
}

.fragment{
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background:rgba(0,255,100,.08);
    color:#00ff73;
    font-weight:700;
}

.final{
    font-size:1.3rem;
    color:#00ff73;
    margin-top:20px;
    word-break:break-word;
}

.fade{
    animation:fade .6s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="card fade" id="app"></div>

<script>

const steps = [
{
title:"The Builder",
question:"What was the name of the startup idea that refused to stay just an idea?",
answer:"ploigisi",
fragment:"ABCD1"
},
{
title:"The Dream Machine",
question:"If money didn't matter tomorrow, which car would be in the garage?",
answer:"mustang",
fragment:"EFGH2"
},
{
title:"The Galaxy",
question:"A long time ago in a galaxy far, far away. What's the series?",
answer:"star wars",
fragment:"IJKL3"
},
{
title:"The Final Ride",
question:"What's the dream bike?",
answer:"ducati v4",
fragment:"MNOP4"
}
];

let current = -1;
let collected = [];

const app = document.getElementById("app");

function intro(){
app.innerHTML=`
<div class="small">PRIVATE VAULT</div>
<h1>Gift Recovery Protocol</h1>
<p>
For the friend who always had the realest advice,
countless gaming sessions,
and lessons that stick longer than he knows.
</p>
<button onclick="nextStep()">Begin Unlock Sequence</button>
`;
}

function nextStep(){

current++;

if(current < steps.length){

const s = steps[current];

app.innerHTML=`
<div class="small">${s.title.toUpperCase()}</div>
<h1>${s.title}</h1>
<p>${s.question}</p>

<input id="ans" placeholder="Enter answer">

<button onclick="check()">Unlock Fragment</button>
`;
}
else{
friendMessage();
}
}

function check(){

let input=document.getElementById("ans").value.trim().toLowerCase();
let correct=steps[current].answer.toLowerCase();

if(
input===correct ||
(correct==="ducati v4" && input.includes("ducati"))
){
collected.push(steps[current].fragment);

app.innerHTML=`
<h1>Fragment Recovered</h1>
<div class="fragment">${steps[current].fragment}</div>
<br>
<button onclick="nextStep()">Continue</button>
`;
}
else{
alert("Access denied.");
}
}

function friendMessage(){

app.innerHTML=`
<div class="small">MEMORY NODE</div>

<h1>No Answer Needed</h1>

<p>
You've been one of the best friends I've ever had.
The guy with the real advice,
the late-night gaming sessions,
and the kind of lessons that stay with people.
Thank you for being my gaming buddy and for teaching me more than you know.
</p>

<button onclick="finalReveal()">Continue</button>
`;
}

function finalReveal(){

app.innerHTML=`
<div class="small">DECRYPTION COMPLETE</div>

<h1>Reward Unlocked</h1>

<p>All fragments recovered successfully.</p>

<div class="fragment">${collected.join(" - ")}</div>

<div class="final">
YOUR-XBOX-CODE-HERE
</div>

<br>

<button onclick="navigator.clipboard.writeText('YOUR-XBOX-CODE-HERE')">
Copy Code
</button>
`;
}

intro();

</script>

</body>
</html>
