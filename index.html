<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault // Access Protocol</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#00ff8c;
  --accent-dim:#00ff8c66;
  --accent-glow:rgba(0,255,140,.45);
  --cyan:#39e6ff;
  --bg:#040506;
  --panel:rgba(255,255,255,.035);
  --line:rgba(0,255,140,.16);
  --ink:#e9f5ee;
  --ink-dim:#7e9089;
  --mono:'Space Mono', monospace;
  --display:'Sora', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--display);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
}

/* ---------- scanlines + vignette, the constant vault "hum" ---------- */
.scan{
  position:fixed; inset:0; z-index:5; pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:overlay;
  opacity:.5;
}
.vignette{
  position:fixed; inset:0; z-index:4; pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,.65) 100%);
}
.noise-frame{
  position:fixed; inset:0; z-index:6; pointer-events:none;
  border:1px solid rgba(0,255,140,.08);
  box-shadow:inset 0 0 120px rgba(0,255,140,.06);
}

/* ---------- ambient backgrounds ---------- */
#bg{ position:fixed; inset:0; z-index:0; pointer-events:none; transition:opacity 1s ease; }

.glow-bg{
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(circle at 18% 25%, rgba(0,255,140,.10), transparent 32%),
    radial-gradient(circle at 82% 75%, rgba(57,230,255,.06), transparent 32%);
  animation:float 11s infinite alternate ease-in-out;
}
@keyframes float{ from{transform:translateY(-16px);} to{transform:translateY(16px);} }

/* hex-rain grid, the vault's default idle texture */
.hexgrid{
  position:fixed; inset:0; z-index:0; overflow:hidden; background:#000;
}
.hexgrid span{
  position:absolute;
  top:-20px;
  font-family:var(--mono);
  color:var(--accent);
  font-size:13px;
  opacity:.16;
  white-space:nowrap;
  animation:hexfall linear infinite;
}
@keyframes hexfall{ from{transform:translateY(-10vh);} to{transform:translateY(110vh);} }

/* starfield for Star Wars step */
.starfield{ position:fixed; inset:0; z-index:0; background:#000; overflow:hidden; }
.starfield span{
  position:absolute; top:50%; left:50%; width:2px; height:2px;
  background:white; border-radius:50%;
  animation:warp linear infinite;
}
@keyframes warp{
  from{ transform:translate(-50%,-50%) translate(0,0) scale(0.3); opacity:0; }
  10%{ opacity:1; }
  to{ transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(1.4); opacity:0; }
}
.saber{
  position:fixed; z-index:0; top:50%; left:50%;
  width:340px; height:3px; border-radius:3px;
  background:linear-gradient(90deg, transparent, var(--cyan), transparent);
  box-shadow:0 0 18px 4px var(--cyan);
  transform:translate(-50%,-50%) rotate(-18deg);
  opacity:.18;
}

/* speed-streak background for car/bike steps */
.streaks{ position:fixed; inset:0; z-index:0; background:radial-gradient(circle at 50% 50%, #0a0a0a, #000 80%); overflow:hidden; }
.streaks span{
  position:absolute; height:2px;
  background:linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:.5; animation:zoom linear infinite; left:-20%;
}
@keyframes zoom{
  from{ transform:translateX(-100px) scaleX(.5); opacity:0; }
  20%{ opacity:.6; }
  to{ transform:translateX(140vw) scaleX(1.5); opacity:0; }
}

/* embers for memory / builder steps */
.embers{ position:fixed; inset:0; z-index:0; background:#050505; overflow:hidden; }
.embers span{
  position:absolute; bottom:-10px; width:4px; height:4px; border-radius:50%;
  background:var(--accent); opacity:.6; animation:rise linear infinite;
}
@keyframes rise{
  from{ transform:translateY(0) translateX(0); opacity:0; }
  10%{ opacity:.8; }
  to{ transform:translateY(-110vh) translateX(var(--drift)); opacity:0; }
}

/* matrix code-rain for final reveal */
.matrix{ position:fixed; inset:0; z-index:0; background:#000; }
.matrix canvas{ display:block; width:100%; height:100%; }

/* letter seal for the no-answer-needed step */
.seal{
  width:64px; height:64px;
  margin:0 auto 18px;
  border:1px solid var(--line);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.seal::before{
  content:"";
  position:absolute; inset:6px;
  border:1px dashed var(--accent-dim);
  border-radius:50%;
  animation:sealSpin 14s linear infinite;
}
.seal svg{ width:26px; height:26px; stroke:var(--accent); fill:none; }
@keyframes sealSpin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }

.letter-text{
  font-family:var(--mono);
  font-size:.92rem;
  line-height:1.95;
  color:#bfe9d3;
  text-align:left;
  margin-bottom:26px;
  white-space:pre-wrap;
}
.letter-text .accentword{ color:var(--accent); font-weight:700; }
.letter-caret{
  display:inline-block; width:7px; height:1em;
  background:var(--accent);
  margin-left:2px; vertical-align:-1px;
  animation:caretBlink 1s steps(1) infinite;
}
.signoff{
  font-family:var(--display);
  font-style:italic;
  color:var(--ink-dim);
  font-size:.85rem;
  margin-top:-10px;
  margin-bottom:22px;
}

/* faint per-step sigil — a wink, not an answer */
.sigil{
  position:fixed; z-index:0; inset:0;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:.05;
}
.sigil svg{ width:60vmin; height:60vmin; stroke:var(--accent); fill:none; }

/* ---------- card ---------- */
.card{
  width:min(92%,620px);
  background:var(--panel);
  border:1px solid var(--line);
  backdrop-filter:blur(22px);
  padding:46px 42px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 0 60px rgba(0,255,140,.07), 0 20px 60px rgba(0,0,0,.5);
  z-index:2;
  position:relative;
}
.card::before{
  content:"";
  position:absolute; inset:0;
  border-radius:18px;
  padding:1px;
  background:linear-gradient(135deg, var(--accent-dim), transparent 40%, transparent 60%, var(--accent-dim));
  -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events:none;
}

.eyebrow{
  color:var(--accent);
  font-family:var(--mono);
  font-size:.72rem;
  margin-bottom:14px;
  letter-spacing:4px;
  text-transform:uppercase;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.eyebrow::before,.eyebrow::after{
  content:""; height:1px; width:24px; background:var(--line);
}
.eyebrow .blip{
  width:6px; height:6px; border-radius:50%; background:var(--accent);
  box-shadow:0 0 8px var(--accent-glow);
  animation:blink 1.4s infinite;
}
@keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.2;} }

h1{
  font-family:var(--display);
  font-size:2rem;
  margin-bottom:16px;
  font-weight:800;
  letter-spacing:-.5px;
}

.tag{
  font-family:var(--mono);
  font-size:.68rem;
  color:var(--ink-dim);
  letter-spacing:2px;
  margin-bottom:22px;
  text-transform:uppercase;
}

p{ color:#bfc9c3; line-height:1.7; margin-bottom:25px; font-weight:300; font-size:1rem; }

button{
  border:none;
  background:var(--accent);
  color:#031108;
  padding:14px 30px;
  border-radius:999px;
  font-weight:700;
  font-family:var(--display);
  cursor:pointer;
  transition:.25s;
  letter-spacing:.3px;
  font-size:.95rem;
  position:relative;
  overflow:hidden;
}
button::after{
  content:"";
  position:absolute; inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.55), transparent);
  transform:translateX(-120%);
  transition:transform .6s ease;
}
button:hover::after{ transform:translateX(120%); }
button:hover{ transform:translateY(-2px); box-shadow:0 0 28px var(--accent-glow); }
button:active{ transform:translateY(0) scale(.97); }
button:focus-visible{ outline:2px solid var(--cyan); outline-offset:3px; }

input{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.12);
  color:white;
  padding:14px 16px;
  border-radius:12px;
  margin:18px 0;
  text-align:center;
  font-size:1rem;
  font-family:var(--mono);
  letter-spacing:1px;
  transition:border-color .25s, box-shadow .25s, background .25s;
}
input::placeholder{ color:#5b665f; font-family:var(--display); letter-spacing:0; }
input:focus{
  outline:none;
  border-color:var(--accent);
  background:rgba(0,255,140,.04);
  box-shadow:0 0 18px rgba(0,255,140,.18);
}
input:focus-visible{ outline:2px solid var(--cyan); outline-offset:2px; }

.fragment{
  margin-top:20px;
  padding:16px;
  border-radius:12px;
  background:rgba(0,255,140,.08);
  border:1px dashed var(--line);
  color:var(--accent);
  font-weight:700;
  font-family:var(--mono);
  letter-spacing:3px;
}

.fragment-row{
  display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
  margin-top:18px;
}
.fragment-chip{
  font-family:var(--mono);
  font-size:.78rem;
  letter-spacing:2px;
  color:var(--accent);
  background:rgba(0,255,140,.07);
  border:1px solid var(--line);
  padding:7px 12px;
  border-radius:8px;
}

.final{
  font-size:1.5rem;
  color:var(--accent);
  margin-top:20px;
  word-break:break-word;
  font-weight:800;
  letter-spacing:1px;
  font-family:var(--mono);
  text-shadow:0 0 18px var(--accent-glow);
}

/* progress rail */
.progress{
  display:flex; justify-content:center; align-items:center; gap:8px;
  margin-bottom:26px;
}
.dot{
  width:7px; height:7px; border-radius:50%;
  background:rgba(255,255,255,.15);
  transition:.3s;
}
.dot.active{ background:var(--accent); box-shadow:0 0 8px var(--accent-glow); transform:scale(1.5); }
.dot.done{ background:var(--accent); opacity:.5; }

/* wrong answer feedback */
.shake{ animation:shake .45s; }
@keyframes shake{
  0%,100%{ transform:translateX(0); }
  20%{ transform:translateX(-10px); }
  40%{ transform:translateX(8px); }
  60%{ transform:translateX(-6px); }
  80%{ transform:translateX(4px); }
}
.wrong-msg{
  color:#ff5c5c;
  font-family:var(--mono);
  font-size:.82rem;
  margin-top:-8px;
  margin-bottom:10px;
  min-height:18px;
  opacity:0;
  transition:opacity .3s ease;
}
.wrong-msg.show{ opacity:1; }

/* transitions */
.fade-in{ animation:fadeIn .55s ease; }
@keyframes fadeIn{
  from{ opacity:0; transform:translateY(14px) scale(.98); }
  to{ opacity:1; transform:translateY(0) scale(1); }
}
.fade-out{ animation:fadeOut .32s ease forwards; }
@keyframes fadeOut{
  from{ opacity:1; transform:translateY(0) scale(1); }
  to{ opacity:0; transform:translateY(-14px) scale(.98); }
}
.fragment-pop{ animation:pop .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop{
  0%{ transform:scale(.4); opacity:0; }
  60%{ transform:scale(1.08); opacity:1; }
  100%{ transform:scale(1); }
}

/* cipher scramble line — the signature element */
.cipher{
  font-family:var(--mono);
  font-size:.72rem;
  letter-spacing:3px;
  color:var(--accent);
  opacity:.55;
  margin-bottom:18px;
  min-height:16px;
}

/* typewriter caret on the question */
.typewriter{ display:inline-block; }
.caret{
  display:inline-block; width:8px; height:1.1em;
  background:var(--accent);
  margin-left:3px; vertical-align:-2px;
  animation:caretBlink 1s steps(1) infinite;
}
@keyframes caretBlink{ 50%{ opacity:0; } }
</style>
</head>
<body>

<div class="hexgrid" id="hexgrid"></div>
<div id="bg"></div>
<div class="vignette"></div>
<div class="scan"></div>
<div class="noise-frame"></div>
<div class="card" id="app"></div>

<script>

/* faint line-art sigils — subtle winks toward each answer, never a giveaway */
const sigils = {
  builder: `<svg viewBox="0 0 200 200"><circle cx="100" cy="100" r="70"/><path d="M100 40 L100 100 L140 130" stroke-width="2"/><path d="M60 60 L80 80 M140 60 L120 80 M60 140 L80 120 M140 140 L120 120" stroke-width="1.5"/></svg>`,
  car: `<svg viewBox="0 0 200 200"><path d="M30 130 Q40 90 80 90 L130 90 Q165 90 170 130" stroke-width="2"/><circle cx="60" cy="135" r="14"/><circle cx="150" cy="135" r="14"/><path d="M20 130 L180 130" stroke-width="2"/></svg>`,
  galaxy: `<svg viewBox="0 0 200 200"><circle cx="100" cy="100" r="3"/><circle cx="60" cy="60" r="1.5"/><circle cx="150" cy="40" r="1.5"/><circle cx="40" cy="150" r="1.5"/><circle cx="160" cy="140" r="1.5"/><path d="M100 100 L130 30" stroke-width="2"/><path d="M100 100 L70 170" stroke-width="2"/></svg>`,
  bike: `<svg viewBox="0 0 200 200"><circle cx="55" cy="140" r="22"/><circle cx="150" cy="140" r="22"/><path d="M55 140 L95 100 L150 140 M95 100 L110 60 L130 60 M95 100 L70 80" stroke-width="2"/></svg>`
};

const steps = [
{
  title:"The Builder",
  question:"What was the name of the startup idea that refused to stay just an idea?",
  answer:"ploigisi",
  fragment:"ABCD1",
  theme:"embers",
  sigil:"builder",
  wrong:["Not quite — that idea had a specific name.", "Close, but the vault doesn't recognize that one.", "Think back to the late-night brainstorms."]
},
{
  title:"The Dream Machine",
  question:"If money didn't matter tomorrow, which car would be in the garage?",
  answer:"mustang",
  fragment:"EFGH2",
  theme:"streaks",
  sigil:"car",
  wrong:["Engines revving... but that's not it.", "Wrong garage. Try again.", "Almost — but not the dream ride."]
},
{
  title:"The Galaxy",
  question:"A long time ago in a galaxy far, far away. What's the series?",
  answer:"star wars",
  fragment:"IJKL3",
  theme:"starfield",
  sigil:"galaxy",
  wrong:["The Force is not strong with that answer.", "Negative. That's not the saga.", "Try again, young Padawan."]
},
{
  title:"The Final Ride",
  question:"What's the dream bike?",
  answer:"ducati v4",
  fragment:"MNOP4",
  theme:"streaks",
  sigil:"bike",
  wrong:["Wrong set of wheels.", "Not the one roaring in the garage.", "Close, but not quite the beast."]
}
];

let current = -1;
let collected = [];

const app = document.getElementById("app");
const bg = document.getElementById("bg");
const hexgrid = document.getElementById("hexgrid");

/* idle hex-rain texture behind everything */
(function initHexRain(){
  const chars = "01ABCDEF#%&";
  let html = '';
  for(let i=0;i<26;i++){
    const left = Math.random()*100;
    const dur = (6 + Math.random()*6).toFixed(2);
    const delay = (Math.random()*6).toFixed(2);
    let str = '';
    for(let j=0;j<6;j++) str += chars[Math.floor(Math.random()*chars.length)];
    html += `<span style="left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s;">${str}</span>`;
  }
  hexgrid.innerHTML = html;
})();

function setBackground(theme, sigilKey){
  let html = '<div class="glow-bg"></div>';

  if(theme === "starfield"){
    let stars = '';
    for(let i=0;i<140;i++){
      const angle = Math.random()*Math.PI*2;
      const dist = 600 + Math.random()*500;
      const tx = Math.cos(angle)*dist;
      const ty = Math.sin(angle)*dist;
      const dur = (1.2 + Math.random()*1.8).toFixed(2);
      const delay = (Math.random()*2).toFixed(2);
      stars += `<span style="--tx:${tx}px;--ty:${ty}px;animation-duration:${dur}s;animation-delay:${delay}s;"></span>`;
    }
    html = `<div class="starfield">${stars}</div><div class="saber"></div>`;
  }
  else if(theme === "streaks"){
    let lines = '';
    for(let i=0;i<22;i++){
      const top = Math.random()*100;
      const dur = (.8 + Math.random()*1.4).toFixed(2);
      const delay = (Math.random()*2).toFixed(2);
      const width = 60 + Math.random()*180;
      lines += `<span style="top:${top}%;width:${width}px;animation-duration:${dur}s;animation-delay:${delay}s;"></span>`;
    }
    html = `<div class="streaks">${lines}</div>`;
  }
  else if(theme === "embers"){
    let dots = '';
    for(let i=0;i<45;i++){
      const left = Math.random()*100;
      const dur = (4 + Math.random()*5).toFixed(2);
      const delay = (Math.random()*5).toFixed(2);
      const drift = (Math.random()*80 - 40).toFixed(0)+"px";
      dots += `<span style="left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s;--drift:${drift};"></span>`;
    }
    html = `<div class="embers">${dots}</div>`;
  }
  else if(theme === "matrix"){
    html = `<div class="matrix"><canvas id="matrixCanvas"></canvas></div>`;
  }

  if(sigilKey && sigils[sigilKey]){
    html += `<div class="sigil">${sigils[sigilKey]}</div>`;
  }

  bg.style.opacity = 0;
  setTimeout(()=>{
    bg.innerHTML = html;
    bg.style.opacity = 1;
    if(theme === "matrix") startMatrixRain();
  }, 350);
}

let matrixInterval = null;
function startMatrixRain(){
  const canvas = document.getElementById('matrixCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, cols, drops;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    cols = Math.floor(w / 16);
    drops = new Array(cols).fill(0).map(()=> Math.random() * -50);
  }
  resize();
  window.addEventListener('resize', resize);

  const chars = "アイウエオカキクケコサシスセソ0123456789ABCDEF#%&";

  if(matrixInterval) clearInterval(matrixInterval);
  matrixInterval = setInterval(()=>{
    ctx.fillStyle = 'rgba(0,0,0,.08)';
    ctx.fillRect(0,0,w,h);
    ctx.font = '15px monospace';
    for(let i=0;i<cols;i++){
      const text = chars[Math.floor(Math.random()*chars.length)];
      const x = i*16;
      const y = drops[i]*16;
      ctx.fillStyle = Math.random() > .96 ? '#d8fff0' : '#00ff8c';
      ctx.fillText(text, x, y);
      if(y > h && Math.random() > .975) drops[i] = 0;
      drops[i]++;
    }
  }, 45);
}

function renderProgress(){
  let dots = '';
  for(let i=0;i<steps.length;i++){
    let cls = 'dot';
    if(i < current) cls += ' done';
    else if(i === current) cls += ' active';
    dots += `<div class="${cls}"></div>`;
  }
  return `<div class="progress">${dots}</div>`;
}

function transitionTo(renderFn){
  app.classList.remove('fade-in');
  app.classList.add('fade-out');
  setTimeout(()=>{
    renderFn();
    app.classList.remove('fade-out');
    app.classList.add('fade-in');
  }, 320);
}

/* cipher scramble effect — characters settle into the target text */
function scrambleInto(el, text, duration=700){
  const chars = "ABCDEF0123456789#%&!?";
  const len = text.length;
  let frame = 0;
  const totalFrames = Math.round(duration/30);
  const interval = setInterval(()=>{
    frame++;
    let out = '';
    const revealCount = Math.floor((frame/totalFrames)*len);
    for(let i=0;i<len;i++){
      if(i < revealCount) out += text[i];
      else out += chars[Math.floor(Math.random()*chars.length)];
    }
    el.textContent = out;
    if(frame >= totalFrames){
      el.textContent = text;
      clearInterval(interval);
    }
  }, 30);
}

/* typewriter for the question text */
function typewrite(el, text, speed=22){
  el.innerHTML = '';
  const span = document.createElement('span');
  span.className = 'typewriter';
  const caret = document.createElement('span');
  caret.className = 'caret';
  el.appendChild(span);
  el.appendChild(caret);
  let i = 0;
  const t = setInterval(()=>{
    span.textContent += text[i];
    i++;
    if(i >= text.length){ clearInterval(t); }
  }, speed);
}

function intro(){
  setBackground("embers");
  app.innerHTML=`
  <div class="eyebrow"><span class="blip"></span>PRIVATE VAULT</div>
  <div class="cipher" id="cipherLine">INITIALIZING SEQUENCE...</div>
  <h1>Gift Recovery Protocol</h1>
  <p>
  For the friend who always had the realest advice,
  countless gaming sessions,
  and lessons that stick longer than he knows.
  </p>
  <button onclick="nextStep()">Begin Unlock Sequence</button>
  `;
  scrambleInto(document.getElementById('cipherLine'), "4 FRAGMENTS DETECTED // AUTH REQUIRED", 900);
}

function nextStep(){
  current++;

  if(current < steps.length){
    transitionTo(()=>{
      const s = steps[current];
      setBackground(s.theme, s.sigil);
      app.innerHTML=`
      ${renderProgress()}
      <div class="eyebrow"><span class="blip"></span>FRAGMENT 0${current+1} OF ${steps.length}</div>
      <h1>${s.title}</h1>
      <div class="tag" id="qtext"></div>

      <input id="ans" placeholder="Enter answer">
      <div class="wrong-msg" id="wrongMsg"></div>

      <button onclick="check()">Unlock Fragment</button>
      `;
      const qtext = document.getElementById('qtext');
      qtext.style.fontFamily = 'var(--display)';
      qtext.style.fontSize = '1rem';
      qtext.style.color = '#bfc9c3';
      qtext.style.letterSpacing = 'normal';
      qtext.style.textTransform = 'none';
      qtext.style.fontWeight = '300';
      qtext.style.lineHeight = '1.7';
      qtext.style.marginBottom = '8px';
      typewrite(qtext, s.question, 18);

      const input = document.getElementById('ans');
      setTimeout(()=> input.focus(), 350);
      input.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter') check();
      });
    });
  }
  else{
    transitionTo(friendMessage);
  }
}

function check(){
  const inputEl = document.getElementById('ans');
  let input = inputEl.value.trim().toLowerCase();
  let correct = steps[current].answer.toLowerCase();

  if(
    input === correct ||
    (correct === "ducati v4" && input.includes("ducati"))
  ){
    collected.push(steps[current].fragment);

    transitionTo(()=>{
      setBackground("embers");
      app.innerHTML=`
      ${renderProgress()}
      <div class="eyebrow"><span class="blip"></span>ACCESS GRANTED</div>
      <h1>Fragment Recovered</h1>
      <div class="fragment fragment-pop" id="fragText"></div>
      <div class="fragment-row">
        ${collected.map(f=>`<div class="fragment-chip">${f}</div>`).join('')}
      </div>
      <br>
      <button onclick="nextStep()">Continue</button>
      `;
      scrambleInto(document.getElementById('fragText'), steps[current].fragment, 650);
    });
  }
  else{
    const wrongMsg = document.getElementById('wrongMsg');
    const options = steps[current].wrong;
    wrongMsg.textContent = options[Math.floor(Math.random()*options.length)];
    wrongMsg.classList.add('show');

    app.classList.remove('shake');
    void app.offsetWidth; // restart animation
    app.classList.add('shake');

    inputEl.value = '';
    inputEl.focus();
  }
}

function friendMessage(){
  setBackground("embers");
  app.innerHTML=`
  <div class="eyebrow"><span class="blip"></span>MEMORY NODE</div>

  <div class="seal"><svg viewBox="0 0 24 24"><path d="M12 2 L14.5 9 L22 9 L16 13.5 L18.5 21 L12 16.5 L5.5 21 L8 13.5 L2 9 L9.5 9 Z"/></svg></div>

  <h1>To My Realest Friend</h1>
  <div class="tag">NO ANSWER REQUIRED — JUST READ</div>

  <div class="letter-text" id="letterText"></div>

  <button id="letterBtn" onclick="finalReveal()" style="opacity:0;transition:opacity .5s ease;">Continue</button>
  `;

  const letter = "You've been one of the best friends I've ever had.\n\nThe guy with the real advice, the late-night gaming sessions, and the kind of lessons that stay with people long after the conversation ends.\n\nThank you for being my gaming buddy — and for teaching me more than you know.";

  const el = document.getElementById('letterText');
  typewrite(el, letter, 16);

  const totalTime = letter.length * 16 + 400;
  setTimeout(()=>{
    document.getElementById('letterBtn').style.opacity = 1;
  }, totalTime);
}

function finalReveal(){
  transitionTo(()=>{
    setBackground("matrix");
    app.innerHTML=`
    <div class="eyebrow"><span class="blip"></span>DECRYPTION COMPLETE</div>

    <h1>Reward Unlocked</h1>

    <p>All fragments recovered successfully.</p>

    <div class="fragment-row">
      ${collected.map(f=>`<div class="fragment-chip">${f}</div>`).join('')}
    </div>

    <div class="final fragment-pop" id="finalCode"></div>

    <br>

    <button onclick="copyCode(this)">Copy Code</button>
    `;
    scrambleInto(document.getElementById('finalCode'), 'YOUR-XBOX-CODE-HERE', 1000);
  });
}

function copyCode(btn){
  navigator.clipboard.writeText('YOUR-XBOX-CODE-HERE');
  const original = btn.textContent;
  btn.textContent = 'Copied!';
  setTimeout(()=>{ btn.textContent = original; }, 1500);
}

intro();

</script>

</body>
</html>
